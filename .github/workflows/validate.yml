name: validate

# Validation only -- nothing is deployed from CI. The course is distributed
# through Moodle and a self-hosted site, both of which are updated deliberately
# (see scripts/publish.sh), not on every push.
#
# The rule this enforces: whatever is on main must render and its code must run.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          # Fails the build if pixi.lock is out of date with pixi.toml,
          # which is what keeps the environment genuinely reproducible.
          locked: true
          cache: true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Lint
        run: pixi run lint

      - name: Test practical solutions
        run: pixi run test

      # Invoke the same pixi tasks a person would run locally. CI previously
      # called publish.sh directly while `pixi run lms` called quarto directly,
      # so a bug in the task definition passed CI and broke the real workflow.
      - name: Render both builds
        run: |
          pixi run site
          pixi run lms

      - name: Show release status
        run: pixi run status

      # Broken links, and .qmd links -- which mean either an unrewritten LMS
      # link or a link to a session held back from the render allowlist.
      - name: Check internal links
        run: pixi run check-links

      # Solutions, instructor material, and raw source files copied in as
      # resources -- the last happens when a page links to a held-back session.
      - name: Check published output
        run: pixi run check-output

      - name: Upload rendered site
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: _site/
          retention-days: 14
